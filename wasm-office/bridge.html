<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Oracle Office — WASM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: monospace; }
    canvas { display: block; width: 100vw; height: 100vh; }

    /* HTML overlay layer — positioned above the canvas */
    #overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 10;
    }

    /* Stats bar (WASM writes to this via js_set_html) */
    #wasm-stats {
      position: fixed; top: 52px; right: 16px;
      color: rgba(255,255,255,0.5); font-size: 12px;
      font-family: monospace; z-index: 20;
    }

    /* Popup container — WASM creates/removes popups here */
    .wasm-popup {
      position: fixed; pointer-events: auto; z-index: 30;
      transition: opacity 0.15s ease;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
  </style>
</head>
<body>
  <div id="overlay"></div>
  <div id="wasm-stats"></div>
  <canvas id="glcanvas"></canvas>

  <!-- Macroquad JS bundle (required) -->
  <script src="mq_js_bundle.js"></script>

  <script>
    // ============================================================
    // JS Bridge — functions WASM imports to control HTML
    // ============================================================

    const decoder = new TextDecoder();
    let wasmInstance = null;

    function readStr(ptr, len) {
      return decoder.decode(new Uint8Array(wasmInstance.exports.memory.buffer, ptr, len));
    }

    // Popup management
    const popups = {};

    const importObject = {
      env: {
        js_show_popup(idPtr, idLen, x, y, htmlPtr, htmlLen) {
          const id = readStr(idPtr, idLen);
          const html = readStr(htmlPtr, htmlLen);
          let el = popups[id];
          if (!el) {
            el = document.createElement('div');
            el.className = 'wasm-popup';
            el.id = `popup-${id}`;
            document.getElementById('overlay').appendChild(el);
            popups[id] = el;
          }
          el.innerHTML = html;
          el.style.left = `${x}px`;
          el.style.top = `${y}px`;
          el.style.opacity = '1';
        },

        js_hide_popup(idPtr, idLen) {
          const id = readStr(idPtr, idLen);
          const el = popups[id];
          if (el) {
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 150);
            delete popups[id];
          }
        },

        js_set_html(selPtr, selLen, htmlPtr, htmlLen) {
          const selector = readStr(selPtr, selLen);
          const html = readStr(htmlPtr, htmlLen);
          const el = document.querySelector(selector);
          if (el) el.innerHTML = html;
        },

        js_set_style(selPtr, selLen, propPtr, propLen, valPtr, valLen) {
          const selector = readStr(selPtr, selLen);
          const prop = readStr(propPtr, propLen);
          const val = readStr(valPtr, valLen);
          const el = document.querySelector(selector);
          if (el) el.style[prop] = val;
        },

        js_play_sound(namePtr, nameLen) {
          const name = readStr(namePtr, nameLen);
          // Simple beep — extend with actual sound files
          if (name === 'saiyan') {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.frequency.value = 800;
            osc.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
          }
        },

        js_console_log(msgPtr, msgLen) {
          console.log('[wasm]', readStr(msgPtr, msgLen));
        }
      }
    };

    // ============================================================
    // Data pump — fetch from maw-js API, push into WASM
    // ============================================================

    function writeStr(str) {
      const encoded = new TextEncoder().encode(str);
      const ptr = wasmInstance.exports.wasm_alloc(encoded.length);
      new Uint8Array(wasmInstance.exports.memory.buffer, ptr, encoded.length).set(encoded);
      return [ptr, encoded.length];
    }

    function pushAgents(agents) {
      // Format: "target|name|session|windowIdx|active|status|preview\n..."
      const lines = agents.map(a =>
        `${a.target}|${a.name}|${a.session}|${a.windowIndex}|${a.active ? 1 : 0}|${a.status}|${a.preview}`
      ).join('\n');
      const [ptr, len] = writeStr(lines);
      wasmInstance.exports.wasm_push_agents(ptr, len);
      wasmInstance.exports.wasm_free(ptr, len);
    }

    function pushSaiyan(targets) {
      const [ptr, len] = writeStr(targets.join('\n'));
      wasmInstance.exports.wasm_push_saiyan(ptr, len);
      wasmInstance.exports.wasm_free(ptr, len);
    }

    function pushFeed(feed) {
      const lines = feed.map(f => `${f.time}|${f.target}|${f.detail}`).join('\n');
      const [ptr, len] = writeStr(lines);
      wasmInstance.exports.wasm_push_feed(ptr, len);
      wasmInstance.exports.wasm_free(ptr, len);
    }

    // Simple ANSI strip
    function stripAnsi(s) {
      return s.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
    }

    // Simple hash
    function hash(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return h;
    }

    // Status detection (mirrors useSessions.ts)
    const busyRx = /[⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏◐◑◒◓]/;
    const hashHistory = {};

    function detectStatus(target, content) {
      const text = stripAnsi(content);
      const lines = text.split('\n').filter(l => l.trim());
      const bottom = lines.slice(-5).join('\n');
      const hasPrompt = bottom.includes('❯');
      const hasBusy = busyRx.test(bottom) || /● \w+/.test(bottom) ||
        /\b(Read|Edit|Write|Bash|Grep|Glob|Agent)\b/.test(bottom);

      const allLines = text.split('\n');
      const topPart = allLines.slice(0, Math.floor(allLines.length * 0.85)).join('\n');
      const h = hash(topPart);

      const entry = hashHistory[target] || { prev: 0, curr: 0, unchangedCount: 0 };
      entry.prev = entry.curr;
      entry.curr = h;
      if (entry.prev !== 0 && entry.prev !== entry.curr) {
        entry.unchangedCount = 0;
      } else {
        entry.unchangedCount++;
      }
      hashHistory[target] = entry;

      if (hasBusy) return 'busy';
      if (hasPrompt && entry.unchangedCount >= 2) return 'ready';
      if (entry.prev === 0) return hasPrompt ? 'ready' : 'idle';
      if (entry.unchangedCount <= 3) return 'busy';
      if (entry.unchangedCount <= 8) return 'ready';
      return hasPrompt ? 'ready' : 'idle';
    }

    // Main data loop
    let sessions = [];
    let agentStates = [];

    async function dataLoop() {
      // WebSocket for sessions
      function connectWS() {
        const ws = new WebSocket(`ws://${location.host}/ws`);
        ws.onmessage = (e) => {
          const data = JSON.parse(e.data);
          if (data.type === 'sessions') sessions = data.sessions;
        };
        ws.onclose = () => setTimeout(connectWS, 1000);
      }
      connectWS();

      // Polling loop for captures
      async function poll() {
        const targets = [];
        sessions.forEach(s =>
          s.windows.forEach(w => targets.push({ target: `${s.name}:${w.index}`, name: w.name, session: s.name, windowIndex: w.index, active: w.active }))
        );

        const agents = [];
        const saiyanList = [];

        for (let i = 0; i < targets.length; i += 4) {
          const batch = targets.slice(i, i + 4);
          await Promise.allSettled(batch.map(async (t) => {
            try {
              const res = await fetch(`/api/capture?target=${encodeURIComponent(t.target)}`);
              const data = await res.json();
              const content = data.content || '';
              const status = detectStatus(t.target, content);
              const text = stripAnsi(content);
              const lines = text.split('\n').filter(l => l.trim());
              const preview = (lines[lines.length - 1] || '').slice(0, 120);

              // Check for saiyan (status transition to busy)
              const prev = agentStates.find(a => a.target === t.target);
              if (prev && prev.status !== 'busy' && status === 'busy') {
                saiyanList.push(t.target);
              }

              agents.push({ ...t, status, preview });
            } catch {
              agents.push({ ...t, status: 'idle', preview: '' });
            }
          }));
        }

        agentStates = agents;

        // Push to WASM
        if (wasmInstance && agents.length > 0) {
          pushAgents(agents);
          if (saiyanList.length > 0) pushSaiyan(saiyanList);
        }

        setTimeout(poll, 5000);
      }
      poll();
    }

    // ============================================================
    // Boot: load WASM with custom imports for the bridge
    // ============================================================

    // Macroquad uses its own loader, but we need to intercept to add our imports.
    // We'll load the WASM manually and hook into Macroquad's init.

    // The Macroquad mq_js_bundle.js sets up `wbg` imports. We extend them.
    // Since macroquad handles its own wasm loading, we use a different approach:
    // we start macroquad normally, then separately call our exported functions.

    // Wait for macroquad's wasm module to be available
    const checkReady = setInterval(() => {
      // macroquad stores the instance in a global
      if (window.wasm_exports) {
        wasmInstance = { exports: window.wasm_exports };
        clearInterval(checkReady);
        console.log('[bridge] Connected to WASM instance');
        dataLoop();
      }
    }, 100);

    // Fallback: if macroquad doesn't expose exports, try via Module
    setTimeout(() => {
      if (!wasmInstance) {
        console.log('[bridge] Trying Module.instance fallback...');
        if (window.Module && window.Module.instance) {
          wasmInstance = window.Module.instance;
          dataLoop();
        }
      }
    }, 3000);
  </script>
</body>
</html>
